name: Docker CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build backend image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/student-backend ./backend

      # Step 4: Build frontend image
      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/student-frontend ./frontend

      # Step 5: Push backend image
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-backend

      # Step 6: Push frontend image
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-frontend 