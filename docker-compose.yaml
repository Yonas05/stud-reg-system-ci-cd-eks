services:

  postgres:
    image: postgres:15
    container_name: student_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studentdb
    ports:
      - "5432:5432"
    volumes:
      - student_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: student_backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: studentdb
      DB_PORT: 5432

  frontend:
    build:
      context: ./frontend
    container_name: student_frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
  pgadmin:
    image: dpage/pgadmin4
    container_name: student_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
  nginx:
    image: nginx:latest
    container_name: student_nginx
    ports:
    - "80:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
    - frontend
    - backend    

volumes:
  student_data: